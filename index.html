<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, push, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB88TfKZBhQaW1VIvt3Zo_2lh2F9Q2kAd0",
  authDomain: "maincourante-claude-2.firebaseapp.com",
  databaseURL: "https://maincourante-claude-2-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "maincourante-claude-2",
  storageBucket: "maincourante-claude-2.firebasestorage.app",
  messagingSenderId: "864916383698",
  appId: "1:864916383698:web:a3982be2aaca64f07f0a0b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ─── PWA Manifest ───
const manifest = {
  name: "SecurLog",
  short_name: "SecurLog",
  start_url: window.location.href,
  display: "standalone",
  background_color: "#0a0e1a",
  theme_color: "#0a0e1a",
  icons: [{ src: "https://via.placeholder.com/192/0a0e1a/4a9ede?text=SL", sizes: "192x192", type: "image/png" }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

// ─── State ───
let state = {
  currentUser: null,
  currentRole: null,
  currentPage: null,
  agents: [],
  admins: [],
  mainCourante: [],
  rondes: [],
  planning: {},
  sites: []
};

// ─── Helpers ───
const DAYS = ['2025-04-28','2025-04-29','2025-04-30','2025-05-01','2025-05-02','2025-05-03','2025-05-04'];
const DAY_LABELS = ['Lun 28/04','Mar 29/04','Mer 30/04','Jeu 01/05','Ven 02/05','Sam 03/05','Dim 04/05'];

window.togglePw = function(inputId, btn) {
  const inp = document.getElementById(inputId);
  if(inp.type==='password'){ inp.type='text'; btn.textContent='🙈'; }
  else { inp.type='password'; btn.textContent='👁'; }
};

function updateClock() {
  const el = document.getElementById('sb-clock');
  if(el) { const now = new Date(); el.textContent = now.toLocaleDateString('fr-FR')+' '+now.toLocaleTimeString('fr-FR'); }
}
setInterval(updateClock, 1000); updateClock();

window.notify = function(msg, type='success') {
  const n = document.getElementById('notification');
  const b = document.getElementById('notif-msg');
  b.textContent = msg;
  b.style.borderColor = type==='danger'?'#e24b4a':'#27c99a';
  b.style.color = type==='danger'?'#e24b4a':'#27c99a';
  n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'), 3200);
};

// ─── Firebase CRUD ───
async function fbSet(path, data) { await set(ref(db, path), data); }
async function fbGet(path) { const s = await get(ref(db, path)); return s.exists()?s.val():null; }
async function fbPush(path, data) { return push(ref(db, path), data); }
async function fbRemove(path) { await remove(ref(db, path)); }
async function fbUpdate(path, data) { await update(ref(db, path), data); }

function fbListen(path, cb) { onValue(ref(db, path), snap => cb(snap.exists()?snap.val():null)); }

// ─── Load initial data from Firebase ───
async function loadAllData() {
  const [agents, admins, mc, rondes, planning, sites] = await Promise.all([
    fbGet('agents'), fbGet('admins'), fbGet('mainCourante'),
    fbGet('rondes'), fbGet('planning'), fbGet('sites')
  ]);

  // Agents
  if(agents) {
    state.agents = Object.entries(agents).map(([k,v])=>({...v, _key:k}));
  } else {
    // Seed default agents
    const defaultAgents = [
      {id:'martin',name:'Martin Dupont',password:'agent123',site:'Site A',status:'actif',phone:'0601020304',email:'martin@securlog.fr',isAdmin:false},
      {id:'leblanc',name:'Sophie Leblanc',password:'agent456',site:'Site B',status:'actif',phone:'0605060708',email:'leblanc@securlog.fr',isAdmin:false},
      {id:'garcia',name:'Carlos Garcia',password:'agent789',site:'Site A',status:'actif',phone:'0609101112',email:'garcia@securlog.fr',isAdmin:false}
    ];
    for(const a of defaultAgents) { const r=await fbPush('agents',a); a._key=r.key; }
    state.agents = defaultAgents;
  }

  // Admins
  if(admins) {
    state.admins = Object.entries(admins).map(([k,v])=>({...v,_key:k}));
  } else {
    const defAdm = [{id:'admin',name:'Admin Central',password:'admin123',role:'super'}];
    for(const a of defAdm) { const r=await fbPush('admins',a); a._key=r.key; }
    state.admins = defAdm;
  }

  // Main courante
  if(mc) {
    state.mainCourante = Object.entries(mc).map(([k,v])=>({...v,_key:k}));
    state.mainCourante.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  } else {
    const defMC = [
      {date:'2025-04-28',time:'07:15',agentId:'martin',agentName:'Martin Dupont',type:'prise_poste',priority:'low',title:'Prise de poste',description:'Prise de poste effectuée. RAS. Matériel vérifié.',site:'Site A',status:'validé'},
      {date:'2025-04-28',time:'09:30',agentId:'martin',agentName:'Martin Dupont',type:'ronde',priority:'low',title:'Ronde de sécurité',description:'Ronde périmétrique effectuée. Zones 1 à 4 contrôlées. Rien à signaler.',site:'Site A',status:'validé'},
      {date:'2025-04-28',time:'11:45',agentId:'leblanc',agentName:'Sophie Leblanc',type:'incident',priority:'high',title:'Intrusion tentative',description:'Individu inconnu tenté d\'accéder au bâtiment B sans badge. Interpellé et reconduit à l\'extérieur.',site:'Site B',status:'en cours'},
    ];
    for(const e of defMC){ const r=await fbPush('mainCourante',e); e._key=r.key; }
    state.mainCourante = defMC;
  }

  // Rondes
  if(rondes) {
    state.rondes = Object.entries(rondes).map(([k,v])=>({...v,_key:k}));
  } else {
    state.rondes = [];
  }

  // Planning
  state.planning = planning || {};

  // Sites
  if(sites) {
    state.sites = Object.entries(sites).map(([k,v])=>({...v,_key:k}));
  } else {
    const defSites = [
      {name:'Site A',address:'123 Rue de la Paix, Marseille',description:'Zone industrielle nord',color:'#4a9ede'},
      {name:'Site B',address:'45 Avenue du Port, Marseille',description:'Centre commercial',color:'#27c99a'},
    ];
    for(const s of defSites){ const r=await fbPush('sites',s); s._key=r.key; }
    state.sites = defSites;
  }
}

let authTab = 'admin';
window.switchAuthTab = function(tab) {
  authTab = tab;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='admin')||(i===1&&tab==='agent')));
  document.getElementById('login-id').value='';
  document.getElementById('login-pw').value='';
  document.getElementById('auth-error').style.display='none';
};

window.doLogin = async function() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display='none';
  if(authTab==='admin') {
    const adm = state.admins.find(a=>a.id===id&&a.password===pw);
    if(!adm){ errEl.textContent='Identifiants invalides.'; errEl.style.display='block'; return; }
    state.currentUser=adm; state.currentRole='admin';
  } else {
    // Check agents + agents with isAdmin flag
    const agent = state.agents.find(a=>a.id===id&&a.password===pw&&a.status==='actif');
    if(!agent){ errEl.textContent='Identifiants invalides ou compte inactif.'; errEl.style.display='block'; return; }
    state.currentUser=agent;
    state.currentRole = agent.isAdmin ? 'admin' : 'agent';
  }
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sb-username').textContent=state.currentUser.name;
  document.getElementById('sb-role').textContent=state.currentRole==='admin'?'Administrateur':'Agent de sécurité';
  buildNav();
  navTo(state.currentRole==='admin'?'dashboard':'saisie');
};

window.doLogout = function() {
  state.currentUser=null; state.currentRole=null; state.currentPage=null;
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-id').value='';
  document.getElementById('login-pw').value='';
};

window.saveShift = async function(agentId, day) {
  let val = document.getElementById('shift-val').value;
  if(val==='custom') val = document.getElementById('custom-shift-val').value.trim()||'—';
  const site = document.getElementById('shift-site').value;
  if(!state.planning[agentId]) state.planning[agentId]={};
  state.planning[agentId][day] = {shift:val, site};
  await fbSet(`planning/${agentId}/${day}`, {shift:val, site});

};

// ─── BADGE HELPERS ───
function typeBadge(t) {
  const map={prise_poste:'<span class="badge badge-info">Prise de poste</span>',ronde:'<span class="badge badge-success">Ronde</span>',incident:'<span class="badge badge-danger">Incident</span>',transmission:'<span class="badge badge-gray">Transmission</span>',info:'<span class="badge badge-info">Information</span>'};
  return map[t]||`<span class="badge badge-gray">${t}</span>`;
}
function priorityBadge(p) {
  const map={high:'<span class="badge badge-danger">Urgente</span>',med:'<span class="badge badge-warn">Importante</span>',low:'<span class="badge badge-gray">Normale</span>'};
  return map[p]||'';
}
function statusBadge(s) {
  const map={validé:'<span class="badge badge-success">Validé</span>','en cours':'<span class="badge badge-warn">En cours</span>',annulé:'<span class="badge badge-danger">Annulé</span>'};
  return map[s]||`<span class="badge badge-gray">${s}</span>`;
}

// ─── INIT ───
(async ()=>{
  try {
    await loadAllData();
    document.getElementById('loading-overlay').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
  } catch(err) {
    document.querySelector('#loading-overlay p').textContent='Erreur de connexion Firebase';
    document.querySelector('#loading-overlay p').style.color='#e24b4a';
    console.error(err);
  }
})();
</script>
